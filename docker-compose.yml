services:
  postgres:
    image: postgres:16-alpine
    container_name: artikula-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: artikula
      POSTGRES_USER: artikula
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artikula -d artikula"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
